model:
  sam3_checkpoint: null
  custom_checkpoint: "./MedicalSAM3/checkpoint/MedSAM3.pt"
  load_from_hf: true
  use_lora: true
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.1
  target_modules: ["q_proj", "k_proj", "v_proj", "out_proj"]
  trainable_modules: ["sam_prompt_encoder", "sam_mask_decoder"]

data:
  dataset: "kvasir"
  data_root: "./MedicalSAM3/data"
  image_size: 1008
  batch_size: 1
  num_workers: 4
  train_ratio: 0.85
  jitter_bbox_ratio: 0.05

training:
  epochs: 20
  learning_rate: 1e-4
  weight_decay: 0.01
  warmup_steps: 50
  gradient_accumulation_steps: 4
  mixed_precision: "fp16"
  output_dir: "./MedicalSAM3/outputs/train_lora"
  save_every_n_epochs: 5
  evaluation_interval: 1
  seed: 42
  max_grad_norm: 1.0

optimizer:
  betas: [0.9, 0.999]
